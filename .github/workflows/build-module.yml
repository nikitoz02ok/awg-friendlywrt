name: Build FriendlyWrt Packages

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "FriendlyWrt branch (e.g. master)"
        required: true
        default: "master-v24.10"
      target:
        description: "Target (e.g. rockchip)"
        required: true
        default: "rockchip"
      subtarget:
        description: "Subtarget (e.g. armv8)"
        required: true
        default: "armv8"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev python3 python3-setuptools python3-pyelftools \
            rsync unzip zlib1g-dev file wget

      - name: Clone FriendlyWrt
        run: |
          git clone https://github.com/friendlyarm/friendlywrt.git
          cd friendlywrt
          git checkout ${{ inputs.branch }}

      - name: Setup feeds
        run: |
          cd friendlywrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Add custom packages
        run: |
          cd friendlywrt

          cp -r ../kmod-amneziawg package/
          cp -r ../amneziawg-tools package/
          cp -r ../luci-proto-amneziawg package/

      - name: Configure build
        run: |
          cd friendlywrt

          cat <<EOF > .config
          CONFIG_TARGET_${{ inputs.target }}=y
          CONFIG_TARGET_${{ inputs.target }}_${{ inputs.subtarget }}=y

          CONFIG_PACKAGE_kmod-amneziawg=m
          CONFIG_PACKAGE_amneziawg-tools=y
          CONFIG_PACKAGE_luci-proto-amneziawg=y
          CONFIG_PACKAGE_luci-i18n-amneziawg-ru=y
          EOF

          make defconfig

      - name: Build toolchain (required for kmods)
        run: |
          cd friendlywrt
          make toolchain/install -j$(nproc) || make toolchain/install -j1 V=s

      - name: Build packages
        run: |
          cd friendlywrt

          make package/kmod-amneziawg/compile V=s -j$(nproc) || true
          make package/amneziawg-tools/compile V=s -j$(nproc)
          make package/luci-proto-amneziawg/compile V=s -j$(nproc)

      - name: Collect artifacts
        run: |
          cd friendlywrt

          mkdir -p ../release

          find bin/ -name "*amneziawg*.ipk" -exec cp {} ../release/ \;
          find bin/ -name "*luci-proto-amneziawg*.ipk" -exec cp {} ../release/ \;
          find bin/ -name "*luci-i18n-amneziawg-ru*.ipk" -exec cp {} ../release/ \;

          echo "Artifacts:"
          ls -la ../release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: friendlywrt-packages
          path: release/
