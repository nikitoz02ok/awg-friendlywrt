name: Build FriendlyWrt (rockchip armv8)

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      TARGET: rockchip
      SUBTARGET: armv8

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3 python3-setuptools python3-pyelftools rsync unzip zlib1g-dev file wget

      - name: Ensure Python modules
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pyelftools

      # ✅ FriendlyWrt
      - name: Clone FriendlyWrt
        run: |
          git clone https://github.com/friendlyarm/friendlywrt.git
          cd friendlywrt
          git checkout "master-v24.10"

      # ✅ feeds
      - name: Setup feeds
        run: |
          cd friendlywrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ✅ пакеты
      - name: Add custom packages
        run: |
          cd friendlywrt
          cp -r ../kmod-amneziawg package/
          cp -r ../amneziawg-tools package/
          cp -r ../luci-proto-amneziawg package/

      # ✅ конфиг (жёстко под rockchip armv8)
      - name: Configure build
        run: |
          cd friendlywrt

          cat <<EOF > .config
          CONFIG_TARGET_rockchip=y
          CONFIG_TARGET_rockchip_armv8=y

          CONFIG_PACKAGE_kmod-amneziawg=m
          CONFIG_PACKAGE_amneziawg-tools=y
          CONFIG_PACKAGE_luci-proto-amneziawg=y
          CONFIG_PACKAGE_luci-i18n-amneziawg-ru=y
          EOF

          make defconfig

      - name: Build toolchain
        run: |
          cd friendlywrt
          make toolchain/install -j$(nproc) || make toolchain/install -j1 V=s

      - name: Build kernel
        run: |
          cd friendlywrt
          make target/linux/compile -j$(nproc) || make target/linux/compile -j1 V=s

      - name: Build packages
        run: |
          cd friendlywrt

          echo "=== kmod ==="
          make package/kmod-amneziawg/compile V=s

          echo "=== tools ==="
          make package/amneziawg-tools/compile V=s

          echo "=== luci ==="
          make package/luci-proto-amneziawg/compile V=s

      - name: Collect artifacts
        run: |
          cd friendlywrt

          mkdir -p ../release

          echo "=== Collect userspace ==="
          find bin/packages -name "*.ipk" | grep -E "amneziawg|luci-proto|luci-i18n" | while read f; do
            base=$(basename "$f")
            cp "$f" "../release/${base%.ipk}_${TARGET}_${SUBTARGET}.ipk"
          done || true

          echo "=== Collect kmod ==="
          find bin/targets -name "*kmod-amneziawg*.ipk" | while read f; do
            base=$(basename "$f")
            cp "$f" "../release/${base%.ipk}_${TARGET}_${SUBTARGET}.ipk"
          done || true

          echo "=== RESULT ==="
          ls -la ../release

      - name: Set release tag
        id: tag
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            echo "tag=manual-$(date +%s)" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: FriendlyWrt rockchip-armv8 ${{ steps.tag.outputs.tag }}
          files: release/*.ipk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
